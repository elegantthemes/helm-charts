apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: {{ .Release.Namespace }}
data:
  nginx.conf: |
    worker_processes auto;

    events {
        worker_connections 1024;
    }

    http {
        include /etc/nginx/mime.types;
        default_type application/octet-stream;

        access_log /var/log/nginx/access.log;
        error_log /var/log/nginx/error.log error;

        sendfile on;
        tcp_nopush on;
        tcp_nodelay on;
        server_names_hash_bucket_size 128;
        client_body_buffer_size 50M;
        client_max_body_size 100M;
        proxy_read_timeout 300;

        # Traefik validates the edge connection and supplies the canonical client
        # address in X-Real-IP. Only trust that header from cluster proxy peers.
{{- range .Values.TRUSTED_PROXY_CIDRS }}
        set_real_ip_from {{ . }};
{{- end }}
        real_ip_header X-Real-IP;

        upstream php {
            server 127.0.0.1:9000;
        }

        server {
            listen 80 default_server;
            server_name {{ .Values.VIRTUAL_HOST }} _;

            root {{ .Values.INSTALL_PATH }}/web;
            index index.html index.htm index.php;

            location = /healthz {
                access_log off;
                return 200;
            }

            location / {
                if ($request_method = OPTIONS) {
                    return 204;
                }

                try_files $uri $uri/ /index.php?$args;
            }

            if (!-e $request_filename) {
                rewrite /wp-admin$ $scheme://$host$uri/ permanent;
                rewrite ^(/[^/]+)?(/wp-.*) $2 last;
                rewrite ^(/[^/]+)?(/.*\.php) $2 last;
            }

            location ~* ^.+\.(ogg|ogv|svg|svgz|eot|otf|woff|mp4|ttf|rss|atom|jpg|jpeg|gif|png|ico|zip|tgz|gz|rar|bz2|doc|xls|exe|ppt|tar|mid|midi|wav|bmp|rtf)$ {
                access_log off;
                log_not_found off;
                expires 1d;
            }

            location ~ [^/]\.php(/|$) {
                fastcgi_index index.php;
                try_files $uri =404;
                fastcgi_split_path_info ^(.+\.php)(/.+)$;
                include fastcgi_params;
                fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
                fastcgi_param HTTP_HOST $host;
                fastcgi_param HTTP_X_REAL_IP $remote_addr;
                fastcgi_param HTTP_X_FORWARDED_FOR $http_x_forwarded_for;
                fastcgi_param HTTP_X_FORWARDED_HOST $http_x_forwarded_host;
                fastcgi_param HTTP_X_FORWARDED_PROTO $http_x_forwarded_proto;
                fastcgi_read_timeout 60;
                fastcgi_pass php;
            }
        }
    }
